<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles.css" />
        <title>smolurl</title>
    </head>
    <body>
        <div class="main-container">
            <h1 class="app-title">
                smol<span style="color: gainsboro">url</span>
            </h1>
            <div class="link-container">
                <label for="urlbox">Enter URL</label>
                <input
                    class="url-input-box"
                    type="text"
                    placeholder="enter url"
                />
                <button class="gen-btn">Generate</button>
            </div>
            <div class="short-url"></div>
            <div>
                <label for="exp-time">Expire In (in min)</label>
                <select class="exp-time">
                    <option value="30">30</option>
                    <option value="60">60</option>
                </select>
            </div>

            <table
                border="1"
                cellpadding="6"
                style="margin-top: 1rem; width: 80%; border-collapse: collapse"
            >
                <thead>
                    <tr>
                        <th>Original URL</th>
                        <th>Short Code</th>
                        <th>Created At</th>
                    </tr>
                </thead>
                <tbody id="urls-tbody"></tbody>
            </table>
            <div
                style="
                    margin-top: 0.5rem;
                    display: flex;
                    align-items: center;
                    gap: 0.5rem;
                "
            >
                <button id="prev-btn" disabled>←</button>
                <span id="page-info">1 / 5</span>
                <button id="next-btn">→</button>
            </div>
        </div>
    </body>
    <script>
        const urlInputElem = document.querySelector(".url-input-box");
        urlInputElem.value =
            "https://www.freecodecamp.org/news/html-button-onclick-javascript-click-event-tutorial/";
        const shortUrlElem = document.querySelector(".short-url");
        const expTimeElem = document.querySelector(".exp-time");
        const genBtn = document.querySelector(".gen-btn");

        genBtn.addEventListener("click", async () => {
            const url = urlInputElem.value;
            const expiration = expTimeElem.value;
            if (!url) return alert("Please enter an url");
            const res = await fetch("/api/v1/url", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    original_url: url,
                    expiration_time: parseInt(expiration),
                }),
            });
            const data = await res.json();
            shortUrlElem.innerHTML = `<a href="http://localhost:8080/${data.smol_url}" target="_blank">http://localhost:8080/${data.smol_url}</a>`;
        });

        // --- Table ---
        const MAX_PAGES = 5;
        let currentPage = 0;

        async function fetchURLs(page) {
            const res = await fetch(`/api/v1/url/top?page=${page}`);
            return res.json();
        }

        function renderRows(urls) {
            document.getElementById("urls-tbody").innerHTML = urls
                .map(
                    (r) => `
                <tr>
                    <td><a href="${r.original_url}" target="_blank">${r.original_url}</a></td>
                    <td><a href="http://localhost:8080/${r.smol_url}" target="_blank">${r.smol_url}</a></td>
                    <td>${new Date(r.created_at).toLocaleString()}</td>
                </tr>
            `,
                )
                .join("");
        }

        function updateControls() {
            document.getElementById("page-info").textContent =
                `${currentPage + 1} / ${MAX_PAGES}`;
            document.getElementById("prev-btn").disabled = currentPage === 0;
            document.getElementById("next-btn").disabled =
                currentPage === MAX_PAGES - 1;
        }

        async function goToPage(page) {
            const data = await fetchURLs(page);
            renderRows(data.data);
            currentPage = page;
            updateControls();
        }

        // Initial load
        goToPage(0);

        document
            .getElementById("prev-btn")
            .addEventListener("click", () => goToPage(currentPage - 1));
        document
            .getElementById("next-btn")
            .addEventListener("click", () => goToPage(currentPage + 1));
    </script>
</html>
