<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>smolurl</title>
</head>

<body>
    <div class="main-container">
        <h1 class="app-title">smol<span style="color: gainsboro;">url</span></h1>
        <div class="link-container">
            <label for="urlbox">Enter URL</label>
            <input class="url-input-box" type="text" placeholder="enter url">
            <button class="gen-btn">Generate</button>
        </div>
        <div class="short-url"></div>
        <div>
            <!-- expiration_time -->
            <label for="exp-time">Expire In (in min)</label>
            <select class="exp-time">
                <option value="30">30</option>
                <option value="60">60</option>
            </select>
        </div>
    </div>
</body>

<script>
    const urlInputElem = document.querySelector(".url-input-box")
    urlInputElem.value = "https://www.freecodecamp.org/news/html-button-onclick-javascript-click-event-tutorial/"
    const shortUrlElem = document.querySelector(".short-url")


    const expTimeElem = document.querySelector(".exp-time")

    const genBtn = document.querySelector(".gen-btn")
    genBtn.addEventListener("click", async () => {
        const url = urlInputElem.value
        const expiration = expTimeElem.value
        if (!url) {
            alert("Please enter an url")
        }
        const res = await fetch("/api/v1/url", {
            method: "POST",
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(
                {
                    "original_url": url,
                    "expiration_time": parseInt(expiration)
                }
            )
        })
        const data = await res.json()
        shortUrlElem.innerHTML = `<a href="http://localhost:8080/${data.smol_url}" target="_blank">http://localhost:8080/${data.smol_url}</a>`;
    })

</script>

</html>
