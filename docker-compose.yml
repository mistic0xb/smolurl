services:
  server:
    image: server
    build: .
    init: true
    depends_on:
      pg-db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./internal/database/migrations:/app/migrations:ro
    environment:
      - CONFIG_PATH=/app/.env
    networks:
      - smolurl-net
    ports:
      - 8080:8080
    restart: on-failure:3
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  redis:
    image: redis:8-alpine
    networks:
      - smolurl-net
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lfu
    # --requirepass ${REDIS_PASSWORD}
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  pg-db:
    image: postgres:18-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USER}
    networks:
      - smolurl-net
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smolurls"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - smolurl-net
    ports:
      - 9090:9090
    restart: always
  
  grafana:
    image: grafana/grafana:latest
    networks:
      - smolurl-net
    ports:
      - 3000:3000
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: always

  loki:
    image: grafana/loki:latest
    networks:
      - smolurl-net
    ports:
      - 3100:3100
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: always
  
  alloy:
    image: grafana/alloy:latest
    networks:
      - smolurl-net
    volumes:
      - ./alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    ports:
      - 12345:12345
    depends_on:
      - loki
    restart: always

  tempo:
    image: grafana/tempo:latest
    networks:
      - smolurl-net
    ports:
      - 3200:3200
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./tempo-config.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    restart: always

networks:
  smolurl-net:

volumes:
  pgdata:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
