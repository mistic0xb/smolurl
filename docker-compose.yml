services:
  server:
    image: server
    build: .
    init: true
    depends_on:
      pg-db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./internal/database/migrations:/app/migrations:ro
    environment:
      - CONFIG_PATH=/app/.env
    networks:
      - smolurl-net
    ports:
      - 8080:8080
    restart: on-failure:3
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  redis:
    image: redis:8-alpine
    networks:
      - smolurl-net
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lfu --requirepass ${REDIS_PASSWORD}
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  pg-db:
    image: postgres:18-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USER}
    networks:
      - smolurl-net
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smolurls"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

networks:
  smolurl-net:

volumes:
  pgdata:
  redis_data:
